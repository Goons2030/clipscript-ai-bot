services:
  - type: web
    name: clipscript-ai-bot
    env: python
    
    # Root directory - where Python app files are located
    rootDir: backend
    
    # Build command - installs FFmpeg + dependencies
    buildCommand: >
      apt-get update &&
      apt-get install -y ffmpeg &&
      pip install -r requirements.txt
    
    # Start unified backend (Telegram + Web API + Web UI)
    startCommand: python app_unified.py
    
    # Python version (3.13 recommended, 3.11+ supported)
    runtime: python-3.13
    
    # Environment variables (defined in Render dashboard, NOT here)
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: WEBHOOK_URL
        sync: false
