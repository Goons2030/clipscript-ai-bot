services:
  - type: web
    name: clipscript-ai-bot
    env: python
    
    # Root directory - where Python app files are located
    rootDir: backend
    
    # Build command - installs FFmpeg + dependencies
    buildCommand: >
      apt-get update &&
      apt-get install -y ffmpeg &&
      pip install -r requirements.txt
    
    # Start unified backend with Gunicorn (production-grade WSGI server)
    # CRITICAL: Use Gunicorn for production, NOT Flask development server
    # Gunicorn handles multiple workers, proper thread-safety, and reloading correctly
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT --timeout 120 --access-logfile - app_unified:app
    
    # Python version (3.13 recommended, 3.11+ supported)
    runtime: python-3.13
    
    # Environment variables (defined in Render dashboard, NOT here)
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: WEBHOOK_URL
        sync: false
